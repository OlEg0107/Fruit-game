<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoldenTrees</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#a8e063, #56ab2f);
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    /* Верх */
    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .balance {
      background: white;
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .shop-btn {
      background: white;
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Карточка дерева */
    .tree-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .tree-img {
      width: 200px;
      margin: 10px auto;
      display: block;
      animation: sway 3s infinite ease-in-out;
    }

    @keyframes sway {
      0% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
      100% { transform: rotate(-1deg); }
    }

    .timer {
      background: #eee;
      padding: 10px;
      border-radius: 12px;
      margin: 15px 0;
      font-size: 14px;
    }

    .collect-btn {
      background: linear-gradient(135deg, #28a745, #1e7e34);
      color: white;
      border: none;
      padding: 16px;
      width: 100%;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .collect-btn:active {
      transform: scale(0.97);
    }

    /* Свайп */
    .nav {
      margin-top: 15px;
    }

    .nav button {
      margin: 0 10px;
      padding: 10px;
      border-radius: 50%;
      border: none;
      background: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="app">

  <!-- Верх -->
  <div class="top">
    <div class="balance" id="balance">0 TON</div>
    <div class="shop-btn">🛒</div>
  </div>

  <!-- Дерево -->
  <div class="tree-card">

    <img id="treeImg" class="tree-img" src="apple.png" />

    <h2 id="treeName">Яблоня</h2>

    <div class="timer" id="timer">
      Можно собирать
    </div>

    <button class="collect-btn" id="collectBtn">
      🍎 Собрать
    </button>

  </div>

  <!-- Навигация -->
  <div class="nav">
    <button onclick="prev()">←</button>
    <button onclick="next()">→</button>
  </div>

</div>

<script>

const trees = [
  { name: "Яблоня", img: "apple.png", income: 0.01, time: 60 },
  { name: "Апельсин", img: "orange.png", income: 0.05, time: 180 },
  { name: "Виноград", img: "grape.png", income: 0.1, time: 300 },
  { name: "Банан", img: "banana.png", income: 0.2, time: 600 },
  { name: "Лимон", img: "lemon.png", income: 0.5, time: 900 }
];

let current = 0;
let balance = Number(localStorage.getItem("balance")) || 0;
let lastCollect = JSON.parse(localStorage.getItem("lastCollect")) || {};

const balanceEl = document.getElementById("balance");
const treeImg = document.getElementById("treeImg");
const treeName = document.getElementById("treeName");
const timerEl = document.getElementById("timer");
const btn = document.getElementById("collectBtn");

function updateUI() {
  const tree = trees[current];

  treeImg.src = tree.img;
  treeName.innerText = tree.name;
  balanceEl.innerText = balance.toFixed(3) + " TON";

  const now = Date.now();
  const last = lastCollect[current] || 0;
  const diff = (now - last) / 1000;

  if (diff >= tree.time) {
    timerEl.innerText = "Можно собирать";
    btn.disabled = false;
    btn.innerText = "💰 Собрать монеты";
  } else {
    const left = Math.floor(tree.time - diff);
    timerEl.innerText = "Следующий сбор: " + formatTime(left);
    btn.disabled = true;
    btn.innerText = "⏳ Ждём";
  }
}

function collect() {
  const tree = trees[current];

  balance += tree.income;
  lastCollect[current] = Date.now();

  localStorage.setItem("balance", balance);
  localStorage.setItem("lastCollect", JSON.stringify(lastCollect));

  updateUI();
}

btn.onclick = collect;

function next() {
  current = (current + 1) % trees.length;
  updateUI();
}

function prev() {
  current = (current - 1 + trees.length) % trees.length;
  updateUI();
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + (s < 10 ? "0" : "") + s;
}

setInterval(updateUI, 1000);

updateUI();

</script>

</body>
</html>
