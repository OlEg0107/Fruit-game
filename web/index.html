<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldenTrees</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1d2a1a;
      min-height: 100vh;
      padding: 18px 16px 40px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 22%),
        radial-gradient(circle at top right, rgba(255,255,255,0.35), transparent 20%),
        linear-gradient(180deg, #c9efff 0%, #dff6b3 24%, #8fd14f 58%, #63b82f 100%);
      overflow-x: hidden;
    }

    .sky-cloud {
      position: fixed;
      background: rgba(255,255,255,0.7);
      border-radius: 999px;
      filter: blur(1px);
      z-index: 0;
      pointer-events: none;
      animation: cloudDrift linear infinite;
    }

    .cloud-1 {
      width: 110px;
      height: 34px;
      top: 24px;
      left: -120px;
      animation-duration: 28s;
    }

    .cloud-2 {
      width: 90px;
      height: 28px;
      top: 84px;
      left: -100px;
      animation-duration: 34s;
      animation-delay: -10s;
    }

    .cloud-3 {
      width: 130px;
      height: 38px;
      top: 58px;
      left: -140px;
      animation-duration: 40s;
      animation-delay: -18s;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 14px;
    }

    .nav-button {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.95);
      color: #29451d;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease;
    }

    .header-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      margin-bottom: 18px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title-icon {
      font-size: 38px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 800;
    }

    .subtitle {
      margin: 0;
      font-size: 15px;
      color: #5d6d57;
    }

    .balance-box {
      margin-top: 18px;
      background: linear-gradient(135deg, #f7ffe8, #ebffd0);
      border-radius: 20px;
      padding: 16px;
      border: 2px solid rgba(120, 176, 64, 0.18);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.35);
    }

    .balance-label {
      font-size: 15px;
      color: #5b6d52;
      margin-bottom: 8px;
    }

    .balance-value {
      font-size: 34px;
      font-weight: 800;
      color: #23351e;
    }

    .section-title {
      font-size: 28px;
      font-weight: 800;
      margin: 26px 0 14px;
      text-align: center;
      color: #203319;
    }

    .tree-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 18px 16px 20px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }

    .shop-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 18px 16px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
      margin-bottom: 14px;
    }

    .tree-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .tree-scene {
      position: relative;
      width: 250px;
      height: 240px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-top: 4px;
      user-select: none;
    }

    .tree-visual {
      position: relative;
      width: 180px;
      height: 210px;
      transform-origin: bottom center;
      animation: sway 3.5s ease-in-out infinite;
      transition: transform 0.25s ease;
    }

    .tree-visual.collecting {
      animation: collectBounce 0.5s ease;
    }

    .tree-trunk {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 96px;
      background: linear-gradient(180deg, #8b5a2b, #6c431b);
      border-radius: 12px;
      z-index: 2;
    }

    .tree-base {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 28px;
      background: rgba(71, 125, 38, 0.20);
      border-radius: 50%;
      z-index: 0;
    }

    .grass {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 34px;
      background: linear-gradient(180deg, #73cb42, #4d9a29);
      border-radius: 50% 50% 45% 45%;
      z-index: 0;
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.15);
    }

    .tree-crown {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 116px;
      border-radius: 50%;
      z-index: 1;
      box-shadow: inset 0 -10px 18px rgba(0,0,0,0.08);
    }

    .tree-crown::before,
    .tree-crown::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .tree-crown::before {
      width: 96px;
      height: 96px;
      left: -18px;
      top: 20px;
    }

    .tree-crown::after {
      width: 96px;
      height: 96px;
      right: -18px;
      top: 20px;
    }

    .fruit {
      position: absolute;
      font-size: 20px;
      z-index: 3;
      animation: fruitPulse 2.2s ease-in-out infinite;
      transition: transform 0.25s ease;
    }

    .tree-visual.collecting .fruit {
      animation: fruitShake 0.45s ease;
    }

    .fruit.f1 { top: 38px; left: 48px; animation-delay: 0s; }
    .fruit.f2 { top: 52px; right: 42px; animation-delay: 0.3s; }
    .fruit.f3 { top: 76px; left: 35px; animation-delay: 0.6s; }
    .fruit.f4 { top: 84px; right: 30px; animation-delay: 0.9s; }
    .fruit.f5 { top: 100px; left: 70px; animation-delay: 1.2s; }

    .floating-reward {
      position: absolute;
      left: 50%;
      top: 55px;
      transform: translateX(-50%);
      font-size: 26px;
      font-weight: 800;
      color: #2f8b1f;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .floating-reward.show {
      animation: floatReward 1s ease forwards;
    }

    .tree-name {
      font-size: 30px;
      font-weight: 800;
      margin-top: 4px;
    }

    .tree-count,
    .tree-reward,
    .tree-total,
    .tree-timer {
      font-size: 18px;
      color: #4f5f49;
      margin-top: 4px;
      text-align: center;
    }

    .tree-total {
      font-weight: 700;
      color: #355028;
    }

    .tree-button,
    .shop-button {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .tree-button:active,
    .shop-button:active,
    .nav-button:active,
    .arrow-button:active {
      transform: scale(0.98);
    }

    .tree-button {
      background: linear-gradient(135deg, #5dbb45, #3f972d);
      color: white;
      box-shadow: 0 6px 14px rgba(63, 151, 45, 0.28);
    }

    .tree-button.bump {
      animation: buttonBump 0.28s ease;
    }

    .tree-button.waiting {
      background: linear-gradient(135deg, #ececf7, #d9d9e8);
      color: #56606a;
      box-shadow: none;
    }

    .shop-button {
      background: linear-gradient(135deg, #fff7dd, #ffe8a3);
      color: #5a4300;
      box-shadow: 0 6px 14px rgba(255, 199, 74, 0.24);
    }

    .shop-top {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
    }

    .shop-emoji {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      background: linear-gradient(135deg, #eefadb, #d8f1b4);
      flex-shrink: 0;
    }

    .shop-info {
      flex: 1;
    }

    .shop-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .shop-price {
      font-size: 16px;
      color: #4f5f49;
      margin-top: 4px;
    }

    .empty-box {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 22px;
      padding: 20px;
      text-align: center;
      color: #516149;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: rgba(30, 45, 22, 0.72);
    }

    .hidden {
      display: none;
    }

    .carousel-wrap {
      position: relative;
      min-height: 500px;
      touch-action: pan-y;
    }

    .carousel-card {
      width: 100%;
    }

    .carousel-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .arrow-button {
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    .dot.active {
      background: #2f6e1f;
      transform: scale(1.15);
    }

    @keyframes sway {
      0% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
      100% { transform: rotate(-2deg); }
    }

    @keyframes fruitPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes fruitShake {
      0% { transform: translateY(0) scale(1); }
      25% { transform: translateY(-3px) scale(1.08); }
      50% { transform: translateY(1px) scale(0.98); }
      75% { transform: translateY(-2px) scale(1.05); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes collectBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.04); }
      60% { transform: scale(0.99); }
      100% { transform: scale(1); }
    }

    @keyframes buttonBump {
      0% { transform: scale(1); }
      50% { transform: scale(0.96); }
      100% { transform: scale(1); }
    }

    @keyframes floatReward {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(8px) scale(0.95);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-34px) scale(1.06);
      }
    }

    @keyframes cloudDrift {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 220px)); }
    }
  </style>
</head>
<body>
  <div class="sky-cloud cloud-1"></div>
  <div class="sky-cloud cloud-2"></div>
  <div class="sky-cloud cloud-3"></div>

  <div class="container">
    <div class="top-bar">
      <button id="navButton" class="nav-button" onclick="toggleScreen()">🛒 Магазин</button>
    </div>

    <div class="header-card">
      <div class="title-row">
        <div class="title-icon">🌳</div>
        <h1>GoldenTrees</h1>
      </div>
      <p class="subtitle" id="subtitle">Собирай TON с деревьев и расширяй свой сад</p>

      <div class="balance-box">
        <div class="balance-label">Твой баланс</div>
        <div class="balance-value" id="balance">0 TON</div>
      </div>
    </div>

    <div id="gardenScreen">
      <div class="section-title">Твой сад</div>
      <div id="trees"></div>
    </div>

    <div id="shopScreen" class="hidden">
      <div class="section-title">Магазин</div>
      <div id="shop"></div>
    </div>

    <div class="footer-note">
      Заходи вовремя и собирай доход вручную 🌿
    </div>
  </div>

  <script>
    let currentScreen = 'garden';
    let currentTreeIndex = 0;
    let touchStartX = 0;
    let touchEndX = 0;

    let balance = Number(localStorage.getItem('balance')) || 0;
    let trees = JSON.parse(localStorage.getItem('trees')) || [{ type: 'apple' }];
    let lastCollected = JSON.parse(localStorage.getItem('lastCollected')) || {};

    const treeTypes = {
      apple: {
        emoji: '🍎',
        fruitEmoji: '🍎',
        name: 'Яблоня',
        price: 0,
        reward: 0.01,
        cooldownHours: 1,
        buttonText: 'Собрать яблоки',
        crown: 'linear-gradient(135deg, #72c94b, #4c9b2d)'
      },
      orange: {
        emoji: '🍊',
        fruitEmoji: '🍊',
        name: 'Апельсин',
        price: 10,
        reward: 0.05,
        cooldownHours: 3,
        buttonText: 'Собрать апельсины',
        crown: 'linear-gradient(135deg, #78c153, #3f8d2c)'
      },
      grape: {
        emoji: '🍇',
        fruitEmoji: '🍇',
        name: 'Виноград',
        price: 30,
        reward: 0.375,
        cooldownHours: 6,
        buttonText: 'Собрать виноград',
        crown: 'linear-gradient(135deg, #63b65b, #327f46)'
      },
      banana: {
        emoji: '🍌',
        fruitEmoji: '🍌',
        name: 'Банан',
        price: 50,
        reward: 1.66,
        cooldownHours: 12,
        buttonText: 'Собрать бананы',
        crown: 'linear-gradient(135deg, #8ad16b, #57a13a)'
      },
      lemon: {
        emoji: '🍋',
        fruitEmoji: '🍋',
        name: 'Лимон',
        price: 100,
        reward: 10,
        cooldownHours: 24,
        buttonText: 'Собрать лимоны',
        crown: 'linear-gradient(135deg, #98d85e, #5fa62f)'
      }
    };

    function formatTime(ms) {
      const totalSeconds = Math.ceil(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${hours}ч ${minutes}м ${seconds}с`;
    }

    function toggleScreen() {
      currentScreen = currentScreen === 'garden' ? 'shop' : 'garden';
      updateScreenVisibility();
    }

    function updateScreenVisibility() {
      const gardenScreen = document.getElementById('gardenScreen');
      const shopScreen = document.getElementById('shopScreen');
      const navButton = document.getElementById('navButton');
      const subtitle = document.getElementById('subtitle');

      if (currentScreen === 'garden') {
        gardenScreen.classList.remove('hidden');
        shopScreen.classList.add('hidden');
        navButton.innerText = '🛒 Магазин';
        subtitle.innerText = 'Собирай TON с деревьев и расширяй свой сад';
      } else {
        gardenScreen.classList.add('hidden');
        shopScreen.classList.remove('hidden');
        navButton.innerText = '🌳 Сад';
        subtitle.innerText = 'Покупай новые деревья и увеличивай доход';
      }
    }

    function getGroupedTrees() {
      const groupedTrees = {};
      trees.forEach((treeObj) => {
        const type = treeObj.type;
        if (!groupedTrees[type]) groupedTrees[type] = 0;
        groupedTrees[type]++;
      });

      return Object.keys(groupedTrees).map((type) => ({
        type,
        count: groupedTrees[type]
      }));
    }

    function prevTree() {
      const grouped = getGroupedTrees();
      if (grouped.length <= 1) return;
      currentTreeIndex--;
      if (currentTreeIndex < 0) currentTreeIndex = grouped.length - 1;
      renderGarden();
    }

    function nextTree() {
      const grouped = getGroupedTrees();
      if (grouped.length <= 1) return;
      currentTreeIndex++;
      if (currentTreeIndex >= grouped.length) currentTreeIndex = 0;
      renderGarden();
    }

    function attachSwipe(element) {
      element.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });

      element.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      });
    }

    function handleSwipe() {
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) < 50) return;
      if (diff < 0) nextTree();
      else prevTree();
    }

    function createTreeVisual(info) {
      const scene = document.createElement('div');
      scene.className = 'tree-scene';

      const reward = document.createElement('div');
      reward.className = 'floating-reward';
      reward.innerText = '';

      const visual = document.createElement('div');
      visual.className = 'tree-visual';

      const crown = document.createElement('div');
      crown.className = 'tree-crown';
      crown.style.background = info.crown;

      const trunk = document.createElement('div');
      trunk.className = 'tree-trunk';

      const base = document.createElement('div');
      base.className = 'tree-base';

      const grass = document.createElement('div');
      grass.className = 'grass';

      for (let i = 1; i <= 5; i++) {
        const fruit = document.createElement('div');
        fruit.className = `fruit f${i}`;
        fruit.innerText = info.fruitEmoji;
        visual.appendChild(fruit);
      }

      visual.appendChild(crown);
      visual.appendChild(trunk);
      scene.appendChild(base);
      scene.appendChild(grass);
      scene.appendChild(reward);
      scene.appendChild(visual);

      return { scene, visual, reward };
    }

    function playCollectAnimation(visual, rewardEl, rewardText) {
      visual.classList.remove('collecting');
      void visual.offsetWidth;
      visual.classList.add('collecting');

      rewardEl.classList.remove('show');
      rewardEl.innerText = rewardText;
      void rewardEl.offsetWidth;
      rewardEl.classList.add('show');
    }

    function renderShop() {
      const shopDiv = document.getElementById('shop');
      shopDiv.innerHTML = '';

      Object.keys(treeTypes).forEach((type) => {
        if (type === 'apple') return;

        const info = treeTypes[type];
        const card = document.createElement('div');
        card.className = 'shop-card';

        const top = document.createElement('div');
        top.className = 'shop-top';

        const emoji = document.createElement('div');
        emoji.className = 'shop-emoji';
        emoji.innerText = info.emoji;

        const infoWrap = document.createElement('div');
        infoWrap.className = 'shop-info';

        const name = document.createElement('div');
        name.className = 'shop-name';
        name.innerText = info.name;

        const price = document.createElement('div');
        price.className = 'shop-price';
        price.innerText = `Цена: ${info.price} TON`;

        infoWrap.appendChild(name);
        infoWrap.appendChild(price);
        top.appendChild(emoji);
        top.appendChild(infoWrap);

        const btn = document.createElement('button');
        btn.className = 'shop-button';
        btn.innerText = `${info.emoji} Купить`;
        btn.onclick = () => buyTree(type);

        card.appendChild(top);
        card.appendChild(btn);
        shopDiv.appendChild(card);
      });
    }

    function renderGarden() {
      const treesDiv = document.getElementById('trees');
      treesDiv.innerHTML = '';

      const grouped = getGroupedTrees();

      if (grouped.length === 0) {
        treesDiv.innerHTML = '<div class="empty-box">У тебя пока нет деревьев</div>';
        return;
      }

      if (currentTreeIndex >= grouped.length) {
        currentTreeIndex = grouped.length - 1;
      }

      const currentTree = grouped[currentTreeIndex];
      const info = treeTypes[currentTree.type];
      const count = currentTree.count;

      const wrap = document.createElement('div');
      wrap.className = 'carousel-wrap';

      const card = document.createElement('div');
      card.className = 'tree-card carousel-card';

      const layout = document.createElement('div');
      layout.className = 'tree-layout';

      const treeVisualData = createTreeVisual(info);
      const scene = treeVisualData.scene;
      const visual = treeVisualData.visual;
      const rewardEl = treeVisualData.reward;

      const name = document.createElement('div');
      name.className = 'tree-name';
      name.innerText = info.name;

      const treeCount = document.createElement('div');
      treeCount.className = 'tree-count';
      treeCount.innerText = 'Количество: ' + count;

      const income = document.createElement('div');
      income.className = 'tree-reward';
      income.innerText = '+' + info.reward + ' TON за 1 дерево';

      const totalReward = count * info.reward;

      const total = document.createElement('div');
      total.className = 'tree-total';
      total.innerText = 'За сбор всех: +' + totalReward.toFixed(3) + ' TON';

      const timer = document.createElement('div');
      timer.className = 'tree-timer';

      const btn = document.createElement('button');
      btn.className = 'tree-button';

      const now = Date.now();
      const cooldownMs = info.cooldownHours * 60 * 60 * 1000;
      const lastTime = lastCollected[currentTree.type] || 0;
      const nextAvailable = lastTime + cooldownMs;

      if (now >= nextAvailable) {
        timer.innerText = 'Можно собирать сейчас';
        btn.innerText = info.emoji + ' ' + info.buttonText;

        btn.onclick = () => {
          balance += totalReward;
          lastCollected[currentTree.type] = Date.now();

          btn.classList.remove('bump');
          void btn.offsetWidth;
          btn.classList.add('bump');

          playCollectAnimation(visual, rewardEl, '+' + totalReward.toFixed(3) + ' TON');

          document.getElementById('balance').innerText = balance.toFixed(3) + ' TON';
          localStorage.setItem('balance', balance);
          localStorage.setItem('lastCollected', JSON.stringify(lastCollected));

          setTimeout(() => {
            render();
          }, 380);
        };
      } else {
        const timeLeft = nextAvailable - now;
        timer.innerText = 'Осталось: ' + formatTime(timeLeft);
        btn.innerText = '⏳ Ждём';
        btn.classList.add('waiting');

        btn.onclick = () => {
          alert('Ещё рано собирать. ' + timer.innerText);
        };
      }

      layout.appendChild(scene);
      layout.appendChild(name);
      layout.appendChild(treeCount);
      layout.appendChild(income);
      layout.appendChild(total);
      layout.appendChild(timer);
      layout.appendChild(btn);

      card.appendChild(layout);
      wrap.appendChild(card);
      attachSwipe(wrap);

      treesDiv.appendChild(wrap);

      if (grouped.length > 1) {
        const controls = document.createElement('div');
        controls.className = 'carousel-controls';

        const prevBtn = document.createElement('button');
        prevBtn.className = 'arrow-button';
        prevBtn.innerText = '←';
        prevBtn.onclick = prevTree;

        const dots = document.createElement('div');
        dots.className = 'dots';

        grouped.forEach((_, index) => {
          const dot = document.createElement('div');
          dot.className = 'dot';
          if (index === currentTreeIndex) dot.classList.add('active');
          dots.appendChild(dot);
        });

        const nextBtn = document.createElement('button');
        nextBtn.className = 'arrow-button';
        nextBtn.innerText = '→';
        nextBtn.onclick = nextTree;

        controls.appendChild(prevBtn);
        controls.appendChild(dots);
        controls.appendChild(nextBtn);

        treesDiv.appendChild(controls);
      }
    }

    function render() {
      document.getElementById('balance').innerText = balance.toFixed(3) + ' TON';
      renderGarden();
      renderShop();
      updateScreenVisibility();

      localStorage.setItem('balance', balance);
      localStorage.setItem('trees', JSON.stringify(trees));
      localStorage.setItem('lastCollected', JSON.stringify(lastCollected));
    }

    function buyTree(type) {
      if (type === 'apple') {
        alert('Яблоня даётся только один раз при старте');
        return;
      }

      const info = treeTypes[type];

      if (balance >= info.price) {
        balance -= info.price;
        trees.push({ type });
      } else {
        alert('Недостаточно TON');
      }

      render();
    }

    render();

    setInterval(() => {
      if (currentScreen === 'garden') {
        renderGarden();
      } else {
        document.getElementById('balance').innerText = balance.toFixed(3) + ' TON';
      }
    }, 1000);
  </script>
</body>
</html>
