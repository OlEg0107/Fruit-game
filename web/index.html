<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Miner</title>
</head>
<body <body style="
margin:0;
font-family:Arial;
text-align:center;
padding:20px;
background: linear-gradient(to bottom, #a8e063, #56ab2f);
color:#222;
">

<style>
.tree {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
button {
  border:none;
  border-radius:10px;
  padding:10px 15px;
}
</style>

<h1>🌳 Fruit Miner</h1>

<p id="balance" style="font-size:24px;">Баланс: 0 TON</p>

<h2>Твои деревья:</h2>

<div id="trees"></div>

<hr>

<h2>Магазин:</h2>

<button onclick="buyTree('apple')" style="padding:10px; margin:5px;">
🍎 Яблоня (бесплатно)
</button>

<button onclick="buyTree('orange')" style="padding:10px; margin:5px;">
🍊 Апельсин (1 TON)
</button>

<script>
let balance = 0;
let trees = [];

// обновление экрана
function render() {
  document.getElementById('balance').innerText = 
    Баланс: ${balance.toFixed(2)} TON;

  const treesDiv = document.getElementById('trees');
  treesDiv.innerHTML = '';

  trees.forEach((tree, index) => {
    const card = document.createElement('div');
card.className = 'tree';

const btn = document.createElement('button');
btn.innerText = tree === 'apple' ? '🍎 Собрать' : '🍊 Собрать';

btn.onclick = () => {
  if (tree === 'apple') balance += 0.01;
  if (tree === 'orange') balance += 0.05;
  render();
};

card.appendChild(btn);
treesDiv.appendChild(card);
    btn.innerText = tree === 'apple' ? '🍎 Собрать' : '🍊 Собрать';
    btn.style.margin = '5px';

    btn.onclick = () => {
      if (tree === 'apple') balance += 0.01;
      if (tree === 'orange') balance += 0.05;
      render();
    };

    treesDiv.appendChild(btn);
  });
}

// покупка дерева
function buyTree(type) {
  if (type === 'apple') {
    trees.push('apple');
  }

  if (type === 'orange') {
    if (balance >= 1) {
      balance -= 1;
      trees.push('orange');
    } else {
      alert('Недостаточно TON');
    }
  }

  render();
}

// старт
render();
</script>

</body>
  <button
    onclick="collectApple()"
    style="font-size:20px; padding:12px 24px; border:none; border-radius:12px; cursor:pointer;"
  >
    🍎 Собрать яблоки
  </button>

  <script>
    let balance = 0;

    function collectApple() {
      balance += 0.01;
      document.getElementById('balance').innerText = 'Баланс: ' + balance.toFixed(2) + ' TON';
    }
  </script>
</body>
</html>
