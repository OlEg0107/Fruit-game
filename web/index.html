<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Miner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: linear-gradient(to bottom, #b7e97b, #61b832);
      color: #1f1f1f;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 20px;
      font-size: 42px;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 14px;
      font-size: 28px;
    }

    #balance {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 24px;
    }

    #trees {
      margin-bottom: 20px;
    }

    .tree-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 22px;
      padding: 18px;
      margin: 14px auto;
      max-width: 340px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
    }

    .tree-emoji {
      font-size: 46px;
      margin-bottom: 8px;
    }

    .tree-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .tree-count {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .tree-income {
      font-size: 18px;
      margin-bottom: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 18px;
      cursor: pointer;
      background: #f3f3f3;
      margin: 6px;
    }

    .collect-button {
      background: #eef3ff;
    }

    .shop-button {
      display: inline-block;
      min-width: 220px;
      background: #ffffff;
    }

    hr {
      border: none;
      border-top: 2px solid rgba(255, 255, 255, 0.55);
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <h1>🌳 Fruit Miner</h1>

  <p id="balance">Баланс: 0 TON</p>

  <h2>Твои деревья:</h2>
  <div id="trees"></div>

  <hr>

  <h2>Магазин:</h2>

  <button class="shop-button" onclick="buyTree('apple')">
    🍎 Яблоня (бесплатно)
  </button>

  <button class="shop-button" onclick="buyTree('orange')">
    🍊 Апельсин (1 TON)
  </button>

  <script>
    let balance = Number(localStorage.getItem('balance')) || 0;

    let trees = JSON.parse(localStorage.getItem('trees')) || [
      { type: 'apple' }
    ];

    function getTreeInfo(type) {
      if (type === 'apple') {
        return {
          emoji: '🍎',
          name: 'Яблоня',
          reward: 0.01,
          buttonText: 'Собрать яблоки'
        };
      }

      if (type === 'orange') {
        return {
          emoji: '🍊',
          name: 'Апельсин',
          reward: 0.05,
          buttonText: 'Собрать апельсины'
        };
      }
    }

    function render() {
      document.getElementById('balance').innerText =
        'Баланс: ' + balance.toFixed(2) + ' TON';

      const treesDiv = document.getElementById('trees');
      treesDiv.innerHTML = '';

      if (trees.length === 0) {
        treesDiv.innerHTML = '<p>У тебя пока нет деревьев</p>';
        return;
      }

      const groupedTrees = {};

      trees.forEach((treeObj) => {
        const type = treeObj.type;
        if (!groupedTrees[type]) {
          groupedTrees[type] = 0;
        }
        groupedTrees[type]++;
      });

      Object.keys(groupedTrees).forEach((type) => {
        const info = getTreeInfo(type);
        const count = groupedTrees[type];

        const card = document.createElement('div');
        card.className = 'tree-card';

        const emoji = document.createElement('div');
        emoji.className = 'tree-emoji';
        emoji.innerText = info.emoji;

        const title = document.createElement('div');
        title.className = 'tree-title';
        title.innerText = info.name;

        const treeCount = document.createElement('div');
        treeCount.className = 'tree-count';
        treeCount.innerText = 'Количество: ' + count;

        const income = document.createElement('div');
        income.className = 'tree-income';
        income.innerText =
          '+' + info.reward.toFixed(2) + ' TON за 1 дерево';

        const total = document.createElement('div');
        total.className = 'tree-income';
        total.innerText =
          'За сбор всех: +' + (count * info.reward).toFixed(2) + ' TON';

        const btn = document.createElement('button');
        btn.className = 'collect-button';
        btn.innerText = info.emoji + ' ' + info.buttonText;

        btn.onclick = () => {
          balance += count * info.reward;
          render();
        };

        card.appendChild(emoji);
        card.appendChild(title);
        card.appendChild(treeCount);
        card.appendChild(income);
        card.appendChild(total);
        card.appendChild(btn);

        treesDiv.appendChild(card);
      });

      localStorage.setItem('balance', balance);
      localStorage.setItem('trees', JSON.stringify(trees));
    }

    function buyTree(type) {
      if (type === 'apple') {
        trees.push({ type: 'apple' });
      } else if (type === 'orange') {
        if (balance >= 1) {
          balance -= 1;
          trees.push({ type: 'orange' });
        } else {
          alert('Недостаточно TON');
        }
      }

      render();
    }

    render();
  </script>
</body>
</html>
