<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldenTrees</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1d2a1a;
      min-height: 100vh;
      padding: 14px 14px 34px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.6), transparent 24%),
        radial-gradient(circle at top right, rgba(255,255,255,0.35), transparent 22%),
        linear-gradient(180deg, #c9efff 0%, #dff6b3 22%, #90d456 56%, #62b42f 100%);
      overflow-x: hidden;
    }

    .sky-cloud {
      position: fixed;
      background: rgba(255,255,255,0.68);
      border-radius: 999px;
      filter: blur(1px);
      z-index: 0;
      pointer-events: none;
      animation: cloudDrift linear infinite;
    }

    .cloud-1 {
      width: 120px;
      height: 34px;
      top: 22px;
      left: -140px;
      animation-duration: 34s;
    }

    .cloud-2 {
      width: 96px;
      height: 28px;
      top: 76px;
      left: -110px;
      animation-duration: 42s;
      animation-delay: -12s;
    }

    .cloud-3 {
      width: 136px;
      height: 40px;
      top: 54px;
      left: -160px;
      animation-duration: 48s;
      animation-delay: -22s;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 12px;
    }

    .nav-button {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.95);
      color: #29451d;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .nav-button:active {
      transform: scale(0.98);
    }

    .header-card {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 28px;
      padding: 20px 18px 18px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
      margin-bottom: 16px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .title-icon {
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 800;
    }

    .subtitle {
      margin: 0;
      font-size: 14px;
      color: #65745d;
    }

    .balance-box {
      margin-top: 16px;
      background: linear-gradient(135deg, #f9ffe9, #eeffd1);
      border-radius: 22px;
      padding: 14px 16px;
      border: 1px solid rgba(120, 176, 64, 0.16);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.36);
    }

    .balance-label {
      font-size: 14px;
      color: #647459;
      margin-bottom: 6px;
    }

    .balance-value {
      font-size: 32px;
      font-weight: 800;
      color: #22351d;
    }

    .section-title {
      font-size: 24px;
      font-weight: 800;
      margin: 20px 0 12px;
      text-align: center;
      color: #203319;
    }

    .tree-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 16px 14px 18px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      overflow: hidden;
      min-height: 490px;
    }

    .shop-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 16px 14px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.13);
      margin-bottom: 12px;
    }

    .tree-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .tree-scene {
      position: relative;
      width: 100%;
      height: 290px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-top: 2px;
      user-select: none;
      overflow: hidden;
    }

    .tree-visual {
      position: relative;
      width: 200px;
      height: 245px;
      transform-origin: bottom center;
      animation: sway 4.8s ease-in-out infinite;
      transition: transform 0.35s ease, filter 0.35s ease;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.14));
    }

    .tree-visual.collecting {
      animation: collectBounce 0.85s cubic-bezier(.2,.8,.2,1);
    }

    .tree-trunk {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 104px;
      background: linear-gradient(180deg, #916134, #6d431d);
      border-radius: 14px;
      z-index: 2;
      box-shadow: inset 0 -4px 10px rgba(0,0,0,0.12);
    }

    .tree-base-shadow {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 28px;
      border-radius: 50%;
      background: rgba(56, 95, 30, 0.18);
      filter: blur(2px);
      z-index: 0;
    }

    .ground {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 56px;
      background: linear-gradient(180deg, #74cb41, #4f9b2b);
      border-radius: 50%;
      z-index: 0;
      box-shadow:
        inset 0 6px 12px rgba(255,255,255,0.14),
        0 8px 14px rgba(0,0,0,0.08);
    }

    .tree-crown {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 144px;
      height: 126px;
      border-radius: 50%;
      z-index: 1;
      box-shadow:
        inset 0 -12px 18px rgba(0,0,0,0.08),
        inset 0 8px 14px rgba(255,255,255,0.10);
    }

    .tree-crown::before,
    .tree-crown::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .tree-crown::before {
      width: 108px;
      height: 108px;
      left: -18px;
      top: 24px;
    }

    .tree-crown::after {
      width: 108px;
      height: 108px;
      right: -18px;
      top: 22px;
    }

    .banana-leaf {
      position: absolute;
      width: 72px;
      height: 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #8ce36a, #58ab36);
      z-index: 2;
      transform-origin: center;
      box-shadow: inset 0 -3px 8px rgba(0,0,0,0.08);
    }

    .banana-leaf.l1 { top: 58px; left: 18px; transform: rotate(-28deg); }
    .banana-leaf.l2 { top: 50px; right: 18px; transform: rotate(28deg); }
    .banana-leaf.l3 { top: 76px; left: 52px; transform: rotate(-8deg); }
    .banana-leaf.l4 { top: 76px; right: 52px; transform: rotate(8deg); }

    .fruit {
      position: absolute;
      font-size: 22px;
      z-index: 3;
      animation: fruitPulse 2.8s ease-in-out infinite;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.12));
    }

    .tree-visual.collecting .fruit {
      animation: fruitShake 0.8s ease;
    }

    .fruit.f1 { top: 42px; left: 54px; animation-delay: 0s; }
    .fruit.f2 { top: 58px; right: 44px; animation-delay: 0.35s; }
    .fruit.f3 { top: 86px; left: 36px; animation-delay: 0.7s; }
    .fruit.f4 { top: 94px; right: 30px; animation-delay: 1.05s; }
    .fruit.f5 { top: 114px; left: 82px; animation-delay: 1.35s; }

    .floating-reward {
      position: absolute;
      left: 50%;
      top: 82px;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 800;
      color: #2f8b1f;
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      text-shadow: 0 2px 8px rgba(255,255,255,0.5);
    }

    .floating-reward.show {
      animation: floatReward 1.8s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .tree-title-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .tree-name {
      font-size: 30px;
      font-weight: 800;
    }

    .tree-count-badge {
      background: #eef8dd;
      color: #3b5b28;
      font-size: 14px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 10px;
    }

    .tree-summary {
      text-align: center;
      margin-top: 6px;
      color: #4f5f49;
      font-size: 16px;
      line-height: 1.45;
    }

    .tree-summary strong {
      color: #28411f;
    }

    .tree-timer {
      font-size: 16px;
      color: #5d6b58;
      margin-top: 6px;
      text-align: center;
    }

    .tree-button,
    .shop-button {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .tree-button:active,
    .shop-button:active,
    .nav-button:active,
    .arrow-button:active {
      transform: scale(0.98);
    }

    .tree-button {
      background: linear-gradient(135deg, #5dbb45, #3f972d);
      color: white;
      box-shadow: 0 10px 20px rgba(63, 151, 45, 0.26);
    }

    .tree-button.bump {
      animation: buttonBump 0.42s ease;
    }

    .tree-button.waiting {
      background: linear-gradient(135deg, #ececf7, #d9d9e8);
      color: #56606a;
      box-shadow: none;
    }

    .shop-button {
      background: linear-gradient(135deg, #fff7dd, #ffe8a3);
      color: #5a4300;
      box-shadow: 0 8px 16px rgba(255, 199, 74, 0.22);
    }

    .shop-top {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
    }

    .shop-emoji {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      background: linear-gradient(135deg, #eefadb, #d8f1b4);
      flex-shrink: 0;
    }

    .shop-info {
      flex: 1;
    }

    .shop-name {
      font-size: 23px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .shop-price {
      font-size: 15px;
      color: #4f5f49;
      margin-top: 4px;
    }

    .empty-box {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 22px;
      padding: 20px;
      text-align: center;
      color: #516149;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: rgba(30, 45, 22, 0.72);
    }

    .hidden {
      display: none;
    }

    .carousel-wrap {
      position: relative;
      min-height: 540px;
      touch-action: pan-y;
    }

    .carousel-card {
      width: 100%;
      opacity: 1;
      transform: translateX(0);
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .carousel-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .arrow-button {
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.48);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .dot.active {
      background: #2f6e1f;
      transform: scale(1.18);
    }

    @keyframes sway {
      0% { transform: rotate(-1.7deg); }
      50% { transform: rotate(1.7deg); }
      100% { transform: rotate(-1.7deg); }
    }

    @keyframes fruitPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes fruitShake {
      0% { transform: translateY(0) scale(1); }
      20% { transform: translateY(-4px) rotate(-4deg) scale(1.08); }
      40% { transform: translateY(1px) rotate(4deg) scale(0.98); }
      60% { transform: translateY(-3px) rotate(-3deg) scale(1.06); }
      80% { transform: translateY(1px) rotate(2deg) scale(1.02); }
      100% { transform: translateY(0) rotate(0) scale(1); }
    }

    @keyframes collectBounce {
      0% { transform: scale(1); }
      25% { transform: scale(1.05); }
      50% { transform: scale(0.98); }
      75% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @keyframes buttonBump {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    @keyframes floatReward {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(14px) scale(0.92);
      }
      15% {
        opacity: 1;
      }
      75% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-58px) scale(1.08);
      }
    }

    @keyframes cloudDrift {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 240px)); }
    }
  </style>
</head>
<body>
  <div class="sky-cloud cloud-1"></div>
  <div class="sky-cloud cloud-2"></div>
  <div class="sky-cloud cloud-3"></div>

  <div class="container">
    <div class="top-bar">
      <button id="navButton" class="nav-button" onclick="toggleScreen()">🛒 Магазин</button>
    </div>

    <div class="header-card">
      <div class="title-row">
        <div class="title-icon">🌳</div>
        <h1>GoldenTrees</h1>
      </div>
      <p class="subtitle" id="subtitle">Собирай TON с деревьев и расширяй свой сад</p>

      <div class="balance-box">
        <div class="balance-label">Твой баланс</div>
        <div class="balance-value" id="balance">0 TON</div>
      </div>
    </div>

    <div id="gardenScreen">
      <div class="section-title">Твой сад</div>
      <div id="trees"></div>
    </div>

    <div id="shopScreen" class="hidden">
      <div class="section-title">Магазин</div>
      <div id="shop"></div>
    </div>

    <div class="footer-note">
      Заходи вовремя и собирай доход вручную 🌿
    </div>
  </div>

  <script>
    let currentScreen = 'garden';
    let currentTreeIndex = 0;
    let touchStartX = 0;
    let touchEndX = 0;
    let isAnimatingSlide = false;

    let balance = Number(localStorage.getItem('balance')) || 0;
    let trees = JSON.parse(localStorage.getItem('trees')) || [{ type: 'apple' }];
    let lastCollected = JSON.parse(localStorage.getItem('lastCollected')) || {};

    const treeTypes = {
      apple: {
        emoji: '🍎',
        fruitEmoji: '🍎',
        name: 'Яблоня',
        price: 0,
        reward: 0.01,
        cooldownHours: 1,
        buttonText: 'Собрать',
        crown: 'linear-gradient(135deg, #72c94b, #4c9b2d)',
        style: 'round'
      },
      orange: {
        emoji: '🍊',
        fruitEmoji: '🍊',
        name: 'Апельсин',
        price: 10,
        reward: 0.05,
        cooldownHours: 3,
        buttonText: 'Собрать',
        crown: 'linear-gradient(135deg, #78c153, #3f8d2c)',
        style: 'round'
      },
      grape: {
        emoji: '🍇',
        fruitEmoji: '🍇',
        name: 'Виноград',
        price: 30,
        reward: 0.375,
        cooldownHours: 6,
        buttonText: 'Собрать',
        crown: 'linear-gradient(135deg, #64b95f, #34794b)',
        style: 'grape'
      },
      banana: {
        emoji: '🍌',
        fruitEmoji: '🍌',
        name: 'Банан',
        price: 50,
        reward: 1.66,
        cooldownHours: 12,
        buttonText: 'Собрать',
        crown: 'linear-gradient(135deg, #93dc68, #5aaa3a)',
        style: 'banana'
      },
      lemon: {
        emoji: '🍋',
        fruitEmoji: '🍋',
        name: 'Лимон',
        price: 100,
        reward: 10,
        cooldownHours: 24,
        buttonText: 'Собрать',
        crown: 'linear-gradient(135deg, #a1df63, #69b234)',
        style: 'round'
      }
    };

    function formatTime(ms) {
      const totalSeconds = Math.ceil(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${hours}ч ${minutes}м ${seconds}с`;
    }

    function toggleScreen() {
      currentScreen = currentScreen === 'garden' ? 'shop' : 'garden';
      updateScreenVisibility();
    }

    function updateScreenVisibility() {
      const gardenScreen = document.getElementById('gardenScreen');
      const shopScreen = document.getElementById('shopScreen');
      const navButton = document.getElementById('navButton');
      const subtitle = document.getElementById('subtitle');

      if (currentScreen === 'garden') {
        gardenScreen.classList.remove('hidden');
        shopScreen.classList.add('hidden');
        navButton.innerText = '🛒 Магазин';
        subtitle.innerText = 'Собирай TON с деревьев и расширяй свой сад';
      } else {
        gardenScreen.classList.add('hidden');
        shopScreen.classList.remove('hidden');
        navButton.innerText = '🌳 Сад';
        subtitle.innerText = 'Покупай новые деревья и увеличивай доход';
      }
    }

    function getGroupedTrees() {
      const groupedTrees = {};
      trees.forEach((treeObj) => {
        const type = treeObj.type;
        if (!groupedTrees[type]) groupedTrees[type] = 0;
        groupedTrees[type]++;
      });

      return Object.keys(groupedTrees).map((type) => ({
        type,
        count: groupedTrees[type]
      }));
    }

    function changeTree(direction) {
      const grouped = getGroupedTrees();
      if (grouped.length <= 1 || isAnimatingSlide) return;

      isAnimatingSlide = true;
      const card = document.querySelector('.carousel-card');

      if (card) {
        card.style.opacity = '0';
        card.style.transform = `translateX(${direction === 'next' ? '-24px' : '24px'}) scale(0.98)`;
      }

      setTimeout(() => {
        if (direction === 'next') {
          currentTreeIndex++;
          if (currentTreeIndex >= grouped.length) currentTreeIndex = 0;
        } else {
          currentTreeIndex--;
          if (currentTreeIndex < 0) currentTreeIndex = grouped.length - 1;
        }

        renderGarden();
        isAnimatingSlide = false;
      }, 180);
    }

    function prevTree() {
      changeTree('prev');
    }

    function nextTree() {
      changeTree('next');
    }

    function attachSwipe(element) {
      element.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });

      element.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      });
    }

    function handleSwipe() {
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) < 45) return;
      if (diff < 0) nextTree();
      else prevTree();
    }

    function createTreeVisual(info) {
      const scene = document.createElement('div');
      scene.className = 'tree-scene';

      const reward = document.createElement('div');
      reward.className = 'floating-reward';

      const visual = document.createElement('div');
      visual.className = 'tree-visual';

      const crown = document.createElement('div');
      crown.className = 'tree-crown';
      crown.style.background = info.crown;

      if (info.style === 'grape') {
        crown.style.width = '138px';
        crown.style.height = '118px';
      }

      const trunk = document.createElement('div');
      trunk.className = 'tree-trunk';

      const shadow = document.createElement('div');
      shadow.className = 'tree-base-shadow';

      const ground = document.createElement('div');
      ground.className = 'ground';

      if (info.style === 'banana') {
        crown.style.width = '96px';
        crown.style.height = '82px';
        crown.style.top = '46px';

        for (let i = 1; i <= 4; i++) {
          const leaf = document.createElement('div');
          leaf.className = `banana-leaf l${i}`;
          visual.appendChild(leaf);
        }
      }

      const fruitCount = info.style === 'grape' ? 6 : 5;

      for (let i = 1; i <= fruitCount; i++) {
        const fruit = document.createElement('div');
        fruit.className = `fruit f${Math.min(i, 5)}`;
        fruit.innerText = info.fruitEmoji;

        if (info.style === 'grape' && i === 6) {
          fruit.style.top = '118px';
          fruit.style.left = '98px';
        }

        if (info.style === 'banana') {
          fruit.style.fontSize = '20px';
        }

        if (info.name === 'Лимон') {
          fruit.style.filter = 'drop-shadow(0 0 6px rgba(255, 235, 130, 0.45))';
        }

        visual.appendChild(fruit);
      }

      visual.appendChild(crown);
      visual.appendChild(trunk);

      scene.appendChild(shadow);
      scene.appendChild(ground);
      scene.appendChild(reward);
      scene.appendChild(visual);

      return { scene, visual, reward };
    }

    function playCollectAnimation(visual, rewardEl, rewardText) {
      visual.classList.remove('collecting');
      void visual.offsetWidth;
      visual.classList.add('collecting');

      rewardEl.classList.remove('show');
      rewardEl.innerText = rewardText;
      void rewardEl.offsetWidth;
      rewardEl.classList.add('show');
    }

    function renderShop() {
      const shopDiv = document.getElementById('shop');
      shopDiv.innerHTML = '';

      Object.keys(treeTypes).forEach((type) => {
        if (type === 'apple') return;

        const info = treeTypes[type];
        const card = document.createElement('div');
        card.className = 'shop-card';

        const top = document.createElement('div');
        top.className = 'shop-top';

        const emoji = document.createElement('div');
        emoji.className = 'shop-emoji';
        emoji.innerText = info.emoji;

        const infoWrap = document.createElement('div');
        infoWrap.className = 'shop-info';

        const name = document.createElement('div');
        name.className = 'shop-name';
        name.innerText = info.name;

        const price = document.createElement('div');
        price.className = 'shop-price';
        price.innerText = `Цена: ${info.price} TON`;

        infoWrap.appendChild(name);
        infoWrap.appendChild(price);
        top.appendChild(emoji);
        top.appendChild(infoWrap);

        const btn = document.createElement('button');
        btn.className = 'shop-button';
        btn.innerText = `${info.emoji} Купить`;
        btn.onclick = () => buyTree(type);

        card.appendChild(top);
        card.appendChild(btn);
        shopDiv.appendChild(card);
      });
    }

    function renderGarden() {
      const treesDiv = document.getElementById('trees');
      treesDiv.innerHTML = '';

      const grouped = getGroupedTrees();

      if (grouped.length === 0) {
        treesDiv.innerHTML = '<div class="empty-box">У тебя пока нет деревьев</div>';
        return;
      }

      if (currentTreeIndex >= grouped.length) {
        currentTreeIndex = grouped.length - 1;
      }

      const currentTree = grouped[currentTreeIndex];
      const info = treeTypes[currentTree.type];
      const count = currentTree.count;

      const wrap = document.createElement('div');
      wrap.className = 'carousel-wrap';

      const card = document.createElement('div');
      card.className = 'tree-card carousel-card';

      const layout = document.createElement('div');
      layout.className = 'tree-layout';

      const treeVisualData = createTreeVisual(info);
      const scene = treeVisualData.scene;
      const visual = treeVisualData.visual;
      const rewardEl = treeVisualData.reward;

      const titleLine = document.createElement('div');
      titleLine.className = 'tree-title-line';

      const name = document.createElement('div');
      name.className = 'tree-name';
      name.innerText = info.name;

      const countBadge = document.createElement('div');
      countBadge.className = 'tree-count-badge';
      countBadge.innerText = 'x' + count;

      titleLine.appendChild(name);
      titleLine.appendChild(countBadge);

      const totalReward = count * info.reward;

      const summary = document.createElement('div');
      summary.className = 'tree-summary';
      summary.innerHTML = `<strong>+${totalReward.toFixed(3)} TON</strong> за сбор`;

      const timer = document.createElement('div');
      timer.className = 'tree-timer';

      const btn = document.createElement('button');
      btn.className = 'tree-button';

      const now = Date.now();
      const cooldownMs = info.cooldownHours * 60 * 60 * 1000;
      const lastTime = lastCollected[currentTree.type] || 0;
      const nextAvailable = lastTime + cooldownMs;

      if (now >= nextAvailable) {
        timer.innerText = 'Можно собирать сейчас';
        btn.innerText = info.emoji + ' ' + info.buttonText;

        btn.onclick = () => {
          balance += totalReward;
          lastCollected[currentTree.type] = Date.now();

          btn.classList.remove('bump');
          void btn.offsetWidth;
          btn.classList.add('bump');

          playCollectAnimation(visual, rewardEl, '+' + totalReward.toFixed(3) + ' TON');

          document.getElementById('balance').innerText = balance.toFixed(3) + ' TON';
          localStorage.setItem('balance', balance);
          localStorage.setItem('lastCollected', JSON.stringify(lastCollected));

          setTimeout(() => {
            render();
          }, 900);
        };
      } else {
        const timeLeft = nextAvailable - now;
        timer.innerText = 'Осталось: ' + formatTime(timeLeft);
        btn.innerText = '⏳ Ждём';
        btn.classList.add('waiting');

        btn.onclick = () => {
          alert('Ещё рано собирать. ' + timer.innerText);
        };
      }

      layout.appendChild(scene);
      layout.appendChild(titleLine);
      layout.appendChild(summary);
      layout.appendChild(timer);
      layout.appendChild(btn);

      card.appendChild(layout);
      wrap.appendChild(card);
      attachSwipe(wrap);

      treesDiv.appendChild(wrap);

      if (grouped.length > 1) {
        const controls = document.createElement('div');
        controls.className = 'carousel-controls';

        const prevBtn = document.createElement('button');
        prevBtn.className = 'arrow-button';
        prevBtn.innerText = '←';
        prevBtn.onclick = prevTree;

        const dots = document.createElement('div');
        dots.className = 'dots';

        grouped.forEach((_, index) => {
          const dot = document.createElement('div');
          dot.className = 'dot';
          if (index === currentTreeIndex) dot.classList.add('active');
          dots.appendChild(dot);
        });

        const nextBtn = document.createElement('button');
        nextBtn.className = 'arrow-button';
        nextBtn.innerText = '→';
        nextBtn.onclick = nextTree;

        controls.appendChild(prevBtn);
        controls.appendChild(dots);
        controls.appendChild(nextBtn);

        treesDiv.appendChild(controls);
      }
    }

    function render() {
      document.getElementById('balance').innerText = balance.toFixed(3) + ' TON';
      renderGarden();
      renderShop();
      updateScreenVisibility();

      localStorage.setItem('balance', balance);
      localStorage.setItem('trees', JSON.stringify(trees));
      localStorage.setItem('lastCollected', JSON.stringify(lastCollected));
    }

    function buyTree(type) {
      if (type === 'apple') {
        alert('Яблоня даётся только один раз при старте');
        return;
      }

      const info = treeTypes[type];

      if (balance >= info.price) {
        balance -= info.price;
        trees.push({ type });
      } else {
        alert('Недостаточно TON');
      }

      render();
    }

    render();

    setInterval(() => {
      if (currentScreen === 'garden') {
        renderGarden();
      } else {
        document.getElementById('balance').innerText = balance.toFixed(3) + ' TON';
      }
    }, 1000);
  </script>
</body>
</html>
