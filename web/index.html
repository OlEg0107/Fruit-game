<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Miner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: linear-gradient(to bottom, #a8e063, #56ab2f);
      color: #222;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 10px;
      font-size: 42px;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 15px;
      font-size: 28px;
    }

    #balance {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    #trees {
      margin-bottom: 20px;
    }

    .tree {
      background: white;
      border-radius: 18px;
      padding: 15px;
      margin: 12px auto;
      max-width: 320px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .tree h3 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .tree p {
      margin: 0 0 12px;
      font-size: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 18px;
      cursor: pointer;
      background: #f2f2f2;
      margin: 6px;
    }

    .shop-button {
      display: inline-block;
    }

    hr {
      border: none;
      border-top: 2px solid rgba(255, 255, 255, 0.5);
      margin: 25px 0;
    }
  </style>
</head>
<body>
  <h1>🌳 Fruit Miner</h1>

  <p id="balance">Баланс: 0 TON</p>

  <h2>Твои деревья:</h2>
  <div id="trees"></div>

  <hr>

  <h2>Магазин:</h2>

  <button class="shop-button" onclick="buyTree('apple')">
    🍎 Яблоня (бесплатно)
  </button>

  <button class="shop-button" onclick="buyTree('orange')">
    🍊 Апельсин (1 TON)
  </button>

  <script>
   let balance = Number(localStorage.getItem('balance')) || 0;

let trees = JSON.parse(localStorage.getItem('trees')) || [
  { type: 'apple' }
];

    function render() {
      document.getElementById('balance').innerText =
        'Баланс: ' + balance.toFixed(2) + ' TON';

      const treesDiv = document.getElementById('trees');
      treesDiv.innerHTML = '';

      if (trees.length === 0) {
        treesDiv.innerHTML = '<p>У тебя пока нет деревьев</p>';
        return;
      }

      trees.forEach((treeObj) => {
        const tree = treeObj.type;

        const card = document.createElement('div');
        card.className = 'tree';

        const title = document.createElement('h3');
        title.innerText = tree === 'apple' ? '🍎 Яблоня' : '🍊 Апельсин';

        const income = document.createElement('p');
        income.innerText =
          tree === 'apple' ? '+0.01 TON за сбор' : '+0.05 TON за сбор';

        const btn = document.createElement('button');
        btn.innerText =
          tree === 'apple' ? '🍎 Собрать яблоки' : '🍊 Собрать апельсины';

        btn.onclick = () => {
          if (tree === 'apple') balance += 0.01;
          if (tree === 'orange') balance += 0.05;
          render();
        };

        card.appendChild(title);
        card.appendChild(income);
        card.appendChild(btn);

        treesDiv.appendChild(card);
      });
      localStorage.setItem('balance', balance);
      localStorage.setItem('trees', JSON.stringify(trees));
    }

    function buyTree(type) {
      if (type === 'apple') {
        trees.push({ type: 'apple' });
      } else if (type === 'orange') {
        if (balance >= 1) {
          balance -= 1;
          trees.push({ type: 'orange' });
        } else {
          alert('Недостаточно TON');
        }
      }

      render();
    }

    render();
  </script>
</body>
</html>
